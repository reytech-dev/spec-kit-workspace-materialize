branches:
  - main

tagFormat: "v${version}"

plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - type: feat
          release: minor
        - type: fix
          release: patch
        - type: perf
          release: patch
        - type: refactor
          release: patch
        - type: docs
          release: false
        - type: test
          release: false
        - type: chore
          release: false
      parserOpts:
        noteKeywords:
          - BREAKING CHANGE
          - BREAKING CHANGES

  - - "@semantic-release/release-notes-generator"
    - preset: conventionalcommits
      presetConfig:
        types:
          - type: feat
            section: Features
          - type: fix
            section: Bug Fixes
          - type: perf
            section: Performance Improvements
          - type: refactor
            section: Code Refactoring
          - type: docs
            section: Documentation
          - type: test
            section: Tests
          - type: chore
            section: Chores
      parserOpts:
        noteKeywords:
          - BREAKING CHANGE
          - BREAKING CHANGES

  - - "@semantic-release/changelog"
    - changelogFile: CHANGELOG.md

  - - "@semantic-release/exec"
    - prepareCmd: |
        python3 .github/scripts/set-extension-version.py ${nextRelease.version}
        mkdir -p dist
        zip -r "dist/spec-kit-draft-v${nextRelease.version}.zip" . \
          -x ".git/*" \
          -x ".github/*" \
          -x ".specify/*" \
          -x ".claude/*" \
          -x ".opencode/*" \
          -x "node_modules/*" \
          -x "dist/*" \
          -x "__pycache__/*" \
          -x "*.pyc"

  - - "@semantic-release/git"
    - assets:
        - extension.yml
        - CHANGELOG.md
      message: "chore(release): v${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"

  - - "@semantic-release/github"
    - assets:
        - path: "dist/spec-kit-draft-v${nextRelease.version}.zip"
          label: "spec-kit-draft-v${nextRelease.version}.zip"