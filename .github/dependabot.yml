version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      semantic-release:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"
      commitlint:
        patterns:
          - "@commitlint/*"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
